version: "3.9"

# ─── Shared networking ────────────────────────────────────────────────────────
networks:
  finai_net:
    driver: bridge

# ─── Shared volumes ───────────────────────────────────────────────────────────
volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  ml_models:

# ─── Base service definition (reused by api/worker/beat) ─────────────────────
x-app-base: &app-base
  build:
    context: .
    dockerfile: docker/Dockerfile
  env_file: .env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    neo4j:
      condition: service_healthy
  networks:
    - finai_net
  restart: unless-stopped
  volumes:
    - ml_models:/app/ml_models

services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finai_db}
      POSTGRES_USER: ${POSTGRES_USER:-finai_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - finai_net
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finai_user} -d ${POSTGRES_DB:-finai_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Neo4j ────────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.18-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-password}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "2G"
      NEO4J_dbms_memory_pagecache_size: "512m"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - finai_net
    ports:
      - "7474:7474"   # Browser
      - "7687:7687"   # Bolt
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-password} 'RETURN 1'"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ─── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-password}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - finai_net
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── FastAPI Application ──────────────────────────────────────────────────────
  api:
    <<: *app-base
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
        --workers 4 --loop uvloop --http httptools
        --access-log --proxy-headers
      "
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Celery Worker ────────────────────────────────────────────────────────────
  worker:
    <<: *app-base
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    healthcheck:
      test: ["CMD", "celery", "-A", "app.workers.celery_app", "inspect", "ping"]
      interval: 60s
      timeout: 30s
      retries: 3

  # ─── Celery Beat Scheduler ────────────────────────────────────────────────────
  beat:
    <<: *app-base
    build:
      context: .
      dockerfile: docker/Dockerfile.beat
    command: celery -A app.workers.celery_app beat --loglevel=info
    depends_on:
      - worker

  # ─── Celery Flower (monitoring) ───────────────────────────────────────────────
  flower:
    <<: *app-base
    command: celery -A app.workers.celery_app flower --port=5555 --basic_auth=admin:admin
    ports:
      - "5555:5555"

  # ─── Nginx Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    networks:
      - finai_net
    restart: unless-stopped

  # ─── Prometheus (metrics) ─────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - finai_net
    restart: unless-stopped

  # ─── Grafana (dashboards) ─────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    networks:
      - finai_net
    restart: unless-stopped
